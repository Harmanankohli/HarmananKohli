<div class="cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="cookie-banner__inner container">
        <p class="cookie-banner__text">
            This site uses minimal cookies for functionality. No tracking cookies are set without your consent.
            <a href="{{ url_for('privacy') }}">Learn more</a>.
        </p>
        <div class="cookie-banner__actions">
            <button class="btn btn--secondary btn--sm" data-consent="reject">Reject</button>
            <button class="btn btn--primary btn--sm" data-consent="accept">Accept</button>
        </div>
    </div>
</div>
